name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        docker builder prune -af
        docker system prune -af

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: |
          src/requirements.txt
          test/requirements-test.txt
          src/requirements-packaging.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        bash src/install.sh
        bash test/install.sh

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'graalvm'
        java-version: '21'
        cache: 'maven'

    - name: Cache SQLcl
      uses: actions/cache@v4
      with:
        path: ~/sqlcl
        key: ${{ runner.os }}-sqlcl-latest

    - name: Install SQLcl
      run: bash test/install_sqlcl.sh

    - name: Start Oracle Database
      run: |
        docker compose up -d

    - name: Wait for Oracle Database
      run: |
        echo "Waiting for Oracle Database to be healthy..."
        MAX_RETRIES=60
        COUNT=0
        until [ "$(docker inspect --format='{{.State.Health.Status}}' oracle-db)" == "healthy" ]; do
            sleep 10
            COUNT=$((COUNT + 1))
            if [ $COUNT -ge $MAX_RETRIES ]; then
                echo "Error: Oracle Database failed to become healthy."
                docker logs oracle-db
                exit 1
            fi
            echo "Still waiting... ($((COUNT * 10))s)"
        done
        echo "Oracle Database container is healthy."

        echo "Ensuring SYSTEM account is unlocked and disabling failed login limit..."
        docker exec -i -u oracle -e ORACLE_SID=FREE oracle-db sqlplus -S / as sysdba <<'EOF'
        ALTER USER system IDENTIFIED BY password ACCOUNT UNLOCK;
        ALTER PROFILE DEFAULT LIMIT FAILED_LOGIN_ATTEMPTS UNLIMITED;
        ALTER SESSION SET CONTAINER = FREEPDB1;
        ALTER USER system IDENTIFIED BY password ACCOUNT UNLOCK;
        EXIT;
        EOF

        echo "Waiting for Oracle Database to accept connections..."
        COUNT=0
        MAX_CONN_RETRIES=20
        until timeout 30s bash -c "echo 'SELECT 1 FROM DUAL;' | sql -L -s system/password@127.0.0.1:1521/FREEPDB1" 2>&1; do
            sleep 30
            COUNT=$((COUNT + 1))
            if [ $COUNT -ge $MAX_CONN_RETRIES ]; then
                echo "Error: Oracle Database failed to accept connections."
                exit 1
            fi
            echo "Still waiting for connection... ($((COUNT * 30))s)"
        done
        echo "Oracle Database is ready for connections."

    - name: Initialize Database Schema
      run: |
        sql system/password@127.0.0.1:1521/FREEPDB1 @test/init_db.sql

    - name: Verify project structure
      run: |
        python test/verify_project.py

    - name: Run tests
      run: |
        mvn test
        pytest

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: |
          src/requirements.txt
          src/requirements-packaging.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r src/requirements.txt
        pip install -r src/requirements-packaging.txt

    - name: Build executable
      run: |
        pyinstaller --onefile --name oracle-clob-tool --paths . src/cli.py

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'graalvm'
        java-version: '21'
        cache: 'maven'

    - name: Build Java Fat JAR
      run: |
        mvn package -DskipTests
        mkdir -p dist
        cp target/oracle-clob-tool.jar dist/oracle-clob-tool.jar
        cp target/oracle-clob-tool.jar dist/oracle-clob-tool-latest.jar
        cp target/oracle-clob-tool.jar dist/oracle-clob-tool-${{ github.ref_name }}.jar

    - name: Build Java Native Image
      continue-on-error: true
      run: |
        mvn package -Pnative -DskipTests
        if [ -f target/oracle-clob-tool ]; then
          cp target/oracle-clob-tool dist/oracle-clob-tool-java
        fi

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/oracle-clob-tool
          dist/oracle-clob-tool-java
          dist/oracle-clob-tool.jar
          dist/oracle-clob-tool-latest.jar
          dist/oracle-clob-tool-${{ github.ref_name }}.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
