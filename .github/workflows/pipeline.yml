name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  verify-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          chmod +x src/install.sh test/install.sh
          ./src/install.sh
          ./test/install.sh

      - name: Verify project structure
        run: python3 test/verify_project.py

      - name: Run tests
        run: pytest
